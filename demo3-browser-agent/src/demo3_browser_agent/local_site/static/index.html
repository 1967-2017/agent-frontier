<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>本地支持工单控制台</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <section class="case-card" aria-label="工单事实">
      <p class="eyebrow">本地支持工单</p>
      <h1>payment-api 事件受理</h1>
      <dl>
        <div><dt>客户等级</dt><dd id="account-tier">企业客户</dd></div>
        <div><dt>事件严重级别</dt><dd id="incident-severity">高</dd></div>
        <div><dt>当前症状</dt><dd>高级商户的结账请求间歇性超时。</dd></div>
      </dl>
    </section>

    <form id="intake-form" class="form-card">
      <label>请求人姓名
        <input id="requester" name="requester" autocomplete="off" placeholder="请输入姓名">
      </label>
      <label>服务名称
        <input id="service" name="service" autocomplete="off" placeholder="请输入服务名称">
      </label>
      <label>事件摘要
        <textarea id="summary" name="summary" placeholder="请填写简短事件摘要"></textarea>
      </label>
      <fieldset>
        <legend>升级路径</legend>
        <label><input type="radio" name="route" value="优先升级"> 优先升级</label>
        <label><input type="radio" name="route" value="标准队列"> 标准队列</label>
      </fieldset>
      <button id="submit" type="submit">提交工单</button>
    </form>

    <section id="confirmation" class="confirmation" hidden aria-live="polite"></section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
